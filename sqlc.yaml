version: "2"
sql:
  # root queries can come here, uncomment this when there are root queries specified in the directory queries
  # - engine: "postgresql"
  #   queries: "internal/infra/database/postgresql/sql/queries/"
  #   schema: "app/internal/adapters/postgres/sql/schema.sql"
  #   gen:
  #     go:
  #       package: "postgresql"
  #       out: "internal/infra/database/postgresql"
  #       sql_package: "pgx/v5"
  #       emit_json_tags: true
  #       emit_db_tags: true

  - engine: "postgresql"
    queries: "internal/infra/database/postgresql/sql/queries/outbox/"
    schema: "app/internal/adapters/postgres/sql/schema.sql"
    gen:
      go:
        package: "postgresql"
        out: "app/internal/adapters/postgres/sql"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_db_tags: true
        emit_sql_as_comment: true

  - engine: "postgresql"
    queries: "internal/infra/database/postgresql/sql/queries/kafka/"
    schema: "app/internal/adapters/postgres/sql/schema.sql"
    gen:
      go:
        package: "postgresql"
        out: "app/internal/adapters/postgres/sql"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_db_tags: true
        emit_sql_as_comment: true

  - engine: "postgresql"
    queries: "internal/infra/database/postgresql/sql/queries/audittrail/"
    schema: "app/internal/adapters/postgres/sql/schema.sql"
    gen:
      go:
        package: "postgresql"
        out: "app/internal/adapters/postgres/sql"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_db_tags: true
        emit_sql_as_comment: true


plugins: []
rules: []
options: {}
